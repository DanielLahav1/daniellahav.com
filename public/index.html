<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Lahav</title>
  <meta name="description" content="Personal academic website of Daniel Lahav">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fdfdfb;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      max-width: 34rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 3.4rem);
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    .rule {
      width: 4.5rem;
      height: 1px;
      background: #b08d3e;
      margin: 1.6rem auto;
    }

    .subtitle {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #666;
    }

    .note {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      color: #999;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Daniel Lahav</h1>
    <div class="rule"></div>
    <p class="subtitle">Physics &middot; Bar-Ilan University</p>
    <p class="note">Personal academic website &mdash; coming soon.</p>
  </main>
</body>
</html>
